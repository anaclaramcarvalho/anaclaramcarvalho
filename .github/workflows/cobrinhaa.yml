name: Glitter Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */12 * * *"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: anaclaramcarvalho
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#ff00ff&color_dots=#1a1b27,#6e40c9,#00eaff,#ff66ff,#ffffff

      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: dist
          publish_branch: output
